<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mycélium : Test de Compatibilité Universelle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen overflow-x-hidden antialiased">
  <div id="app" class="min-h-screen relative">
    <!-- Accueil : façade institutionnelle (ne montre pas les leaders) -->
    <div id="view-selector" class="min-h-screen flex flex-col items-center justify-center p-8 bg-[#f6f4ef]">
      <div class="w-full max-w-4xl">
        <div class="mb-10">
          <h1 class="text-4xl md:text-5xl font-serif font-bold text-slate-800">Mycélium</h1>
          <p class="text-slate-600 mt-2">Test de Compatibilité Universelle</p>
          <p class="text-slate-500 text-sm mt-3 max-w-2xl">Veuillez sélectionner un protocole. Les réponses seront utilisées pour optimiser votre profil de compatibilité.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <button data-test="trump" class="test-card group p-6 rounded-xl bg-white shadow-sm hover:shadow-md transition-all border border-slate-200 hover:border-slate-300 text-left">
            <span class="text-lg font-serif font-bold text-slate-800">Questionnaire 1 : Analyse de la structure de l'ego</span>
            <p class="mt-2 text-slate-600 text-sm">Temps estimé : 5 minutes. Répondez avec honnêteté pour des résultats optimaux.</p>
          </button>
          <button data-test="musk" class="test-card group p-6 rounded-xl bg-white shadow-sm hover:shadow-md transition-all border border-slate-200 hover:border-slate-300 text-left">
            <span class="text-lg font-serif font-bold text-slate-800">Questionnaire 2 : Évaluation cognitive et spatiale</span>
            <p class="mt-2 text-slate-600 text-sm">Temps estimé : 5 minutes. Répondez avec honnêteté pour des résultats optimaux.</p>
          </button>
          <button data-test="bdw" class="test-card group p-6 rounded-xl bg-white shadow-sm hover:shadow-md transition-all border border-slate-200 hover:border-slate-300 text-left">
            <span class="text-lg font-serif font-bold text-slate-800">Questionnaire 3 : Étude sur la cohésion des structures</span>
            <p class="mt-2 text-slate-600 text-sm">Temps estimé : 5 minutes. Répondez avec honnêteté pour des résultats optimaux.</p>
          </button>
          <button data-test="putin" class="test-card group p-6 rounded-xl bg-white shadow-sm hover:shadow-md transition-all border border-slate-200 hover:border-slate-300 text-left">
            <span class="text-lg font-serif font-bold text-slate-800">Questionnaire 4 : Protocole de stabilité systémique</span>
            <p class="mt-2 text-slate-600 text-sm">Temps estimé : 5 minutes. Répondez avec honnêteté pour des résultats optimaux.</p>
          </button>
          <button data-test="self-growth" class="test-card group p-6 rounded-xl bg-white shadow-sm hover:shadow-md transition-all border border-slate-200 hover:border-slate-300 text-left">
            <span class="text-lg font-serif font-bold text-slate-800">Questionnaire 5 : The Self-Growth Network</span>
            <p class="mt-2 text-slate-600 text-sm">Test de personnalité poétique — 7 pôles, équilibre intérieur. Honnête et analytique.</p>
          </button>
        </div>
        <p class="text-slate-400 text-xs mt-10">Version d'évaluation interne • Mycelium - The Rigged Personality Engine</p>
      </div>
    </div>

    <!-- Zone du test actif (questions + résultat) -->
    <div id="view-test" class="hidden min-h-screen relative">
      <div id="test-stage" class="min-h-screen flex flex-col items-center justify-center p-8 transition-all duration-500 relative z-10">
        <!-- Barre de progression (cachée ou stylée selon le test) -->
        <div id="progress-bar-container" class="w-full max-w-xl mb-8">
          <div id="progress-bar" class="h-2 rounded-full bg-white/30 transition-all duration-500" style="width: 0%"></div>
        </div>
        <p id="question-label" class="text-sm uppercase tracking-wider text-white/70 mb-4"></p>
        <h2 id="question-text" class="text-2xl md:text-4xl font-bold text-center text-white mb-12 max-w-3xl leading-tight"></h2>
        <div id="options-container" class="flex flex-col gap-4 w-full max-w-2xl"></div>
        <!-- Bouton suivant (si besoin) -->
        <button id="btn-next" class="hidden mt-8 px-8 py-3 rounded-lg font-semibold bg-white/20 hover:bg-white/30 text-white transition">Suivant</button>
      </div>

      <!-- Écran de résultat (caché au départ) : calque fixe au-dessus de tout (GIFs + popups chaos) -->
      <div id="result-stage" class="hidden min-h-screen flex flex-col items-center justify-center p-8 text-center fixed inset-0 z-[100]">
        <div id="result-content"></div>
        <div class="mt-8 flex gap-4 flex-wrap justify-center">
          <button id="btn-redo" class="px-6 py-3 rounded-lg font-semibold bg-white/20 hover:bg-white/30 text-white border border-white/30 transition">Refaire le test</button>
          <button id="btn-back-to-selector" class="px-6 py-3 rounded-lg font-semibold bg-white/20 hover:bg-white/30 text-white border border-white/30 transition">Choisir un autre test</button>
        </div>
      </div>
    </div>

    <!-- Questionnaire 5 : Self-Growth (vanilla JS, même page) -->
    <div id="view-self-growth" class="hidden min-h-screen relative bg-[#070B0A]">
      <div id="sg-stage" class="min-h-screen flex flex-col items-center justify-center p-6 md:p-10">
        <p id="sg-label" class="text-sm uppercase tracking-wider text-[#D4AF37] mb-2 font-mono"></p>
        <h2 id="sg-question" class="text-xl md:text-2xl font-serif font-semibold text-[#F1F1E6] text-center mb-8 max-w-2xl leading-tight"></h2>
        <div id="sg-options" class="flex flex-wrap justify-center gap-2 max-w-2xl"></div>
        <button id="sg-next" class="mt-8 px-6 py-3 rounded-xl font-medium bg-white/10 hover:bg-white/20 text-[#F1F1E6] border border-white/20 transition-all">Suivant</button>
      </div>
      <div id="sg-result" class="hidden min-h-screen flex flex-col items-center justify-center p-6 md:p-10 text-center">
        <h2 class="font-serif text-2xl font-bold text-[#F1F1E6] mb-4">Votre graphique Mycélium</h2>
        <div class="w-full max-w-md mx-auto mb-6"><canvas id="sg-radar"></canvas></div>
        <p id="sg-interpretation" class="text-[#D4AF37] font-serif text-lg max-w-xl mb-2"></p>
        <p id="sg-synthesis" class="text-[#F1F1E6]/80 text-sm max-w-xl mb-8"></p>
        <div class="flex gap-4 flex-wrap justify-center">
          <button id="sg-redo" class="px-6 py-3 rounded-xl font-medium bg-white/10 hover:bg-white/20 text-[#F1F1E6] border border-white/20">Refaire le test</button>
          <button id="sg-back-to-selector" class="px-6 py-3 rounded-xl font-medium bg-white/10 hover:bg-white/20 text-[#F1F1E6] border border-white/20">Retour à l'accueil</button>
        </div>
      </div>
    </div>

    <!-- Barre fixe : Retour (en bas à gauche) -->
    <div id="global-nav" class="fixed bottom-4 left-4 z-50 flex flex-col gap-2 opacity-0 pointer-events-none transition-opacity duration-300">
      <button id="btn-back" class="px-4 py-2 rounded-lg bg-black/60 hover:bg-black/80 text-white text-sm font-medium backdrop-blur">
        ← Retour
      </button>
    </div>

    <!-- Canvas / overlays pour effets (pluie, confettis, etc.) -->
    <div id="effects-layer" class="fixed inset-0 pointer-events-none z-40 overflow-hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
