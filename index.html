<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mycélium – Tests de Personnalité</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet" />
</head>
<body class="min-h-screen overflow-x-hidden antialiased">
  <div id="app" class="min-h-screen relative">
    <!-- Écran de sélection des tests -->
    <div id="view-selector" class="min-h-screen flex flex-col items-center justify-center p-8 bg-gradient-to-br from-slate-100 to-slate-200">
      <h1 class="text-4xl font-serif font-bold text-slate-800 mb-2">Mycélium</h1>
      <p class="text-slate-600 mb-12">Choisissez votre test de personnalité</p>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl">
        <button data-test="musk" class="test-card group p-6 rounded-xl bg-white shadow-lg hover:shadow-xl transition-all border-2 border-transparent hover:border-slate-400 text-left">
          <span class="text-2xl font-semibold text-slate-800 group-hover:text-black">Techno-King</span>
          <p class="mt-2 text-slate-600 text-sm">Les 7 péchés capitaux façon Silicon Valley.</p>
        </button>
        <button data-test="bdw" class="test-card group p-6 rounded-xl bg-white shadow-lg hover:shadow-xl transition-all border-2 border-transparent hover:border-yellow-500 text-left">
          <span class="text-2xl font-semibold text-slate-800 group-hover:text-black">Citoyenneté Belge</span>
          <p class="mt-2 text-slate-600 text-sm">Test de citoyenneté belge neutre.</p>
        </button>
        <button data-test="trump" class="test-card group p-6 rounded-xl bg-white shadow-lg hover:shadow-xl transition-all border-2 border-transparent hover:border-amber-500 text-left">
          <span class="text-2xl font-semibold text-slate-800 group-hover:text-black">The Winner's Path</span>
          <p class="mt-2 text-slate-600 text-sm">Découvrez votre potentiel de gagnant.</p>
        </button>
        <button data-test="putin" class="test-card group p-6 rounded-xl bg-white shadow-lg hover:shadow-xl transition-all border-2 border-transparent hover:border-red-900 text-left">
          <span class="text-2xl font-semibold text-slate-800 group-hover:text-black">Interrogation 7-S</span>
          <p class="mt-2 text-slate-600 text-sm">Protocole de sécurité d'État.</p>
        </button>
      </div>
    </div>

    <!-- Zone du test actif (questions + résultat) -->
    <div id="view-test" class="hidden min-h-screen relative">
      <div id="test-stage" class="min-h-screen flex flex-col items-center justify-center p-8 transition-all duration-500">
        <!-- Barre de progression (cachée ou stylée selon le test) -->
        <div id="progress-bar-container" class="w-full max-w-xl mb-8">
          <div id="progress-bar" class="h-2 rounded-full bg-white/30 transition-all duration-500" style="width: 0%"></div>
        </div>
        <p id="question-label" class="text-sm uppercase tracking-wider text-white/70 mb-4"></p>
        <h2 id="question-text" class="text-2xl md:text-4xl font-bold text-center text-white mb-12 max-w-3xl leading-tight"></h2>
        <div id="options-container" class="flex flex-col gap-4 w-full max-w-2xl"></div>
        <!-- Bouton suivant (si besoin) -->
        <button id="btn-next" class="hidden mt-8 px-8 py-3 rounded-lg font-semibold bg-white/20 hover:bg-white/30 text-white transition">Suivant</button>
      </div>

      <!-- Écran de résultat (caché au départ) -->
      <div id="result-stage" class="hidden min-h-screen flex flex-col items-center justify-center p-8 text-center">
        <div id="result-content"></div>
        <div class="mt-8 flex gap-4 flex-wrap justify-center">
          <button id="btn-redo" class="px-6 py-3 rounded-lg font-semibold bg-white/20 hover:bg-white/30 text-white border border-white/30 transition">Refaire le test</button>
          <button id="btn-back-to-selector" class="px-6 py-3 rounded-lg font-semibold bg-white/20 hover:bg-white/30 text-white border border-white/30 transition">Choisir un autre test</button>
        </div>
      </div>
    </div>

    <!-- Barre fixe : Retour + Sélecteur de test (en bas à gauche) -->
    <div id="global-nav" class="fixed bottom-4 left-4 z-50 flex flex-col gap-2 opacity-0 pointer-events-none transition-opacity duration-300">
      <button id="btn-back" class="px-4 py-2 rounded-lg bg-black/60 hover:bg-black/80 text-white text-sm font-medium backdrop-blur">
        ← Retour
      </button>
      <div class="flex flex-wrap gap-2">
        <button data-nav="musk" class="nav-test px-3 py-1.5 rounded bg-white/20 hover:bg-white/40 text-white text-xs">Musk</button>
        <button data-nav="bdw" class="nav-test px-3 py-1.5 rounded bg-white/20 hover:bg-white/40 text-white text-xs">BDW</button>
        <button data-nav="trump" class="nav-test px-3 py-1.5 rounded bg-white/20 hover:bg-white/40 text-white text-xs">Trump</button>
        <button data-nav="putin" class="nav-test px-3 py-1.5 rounded bg-white/20 hover:bg-white/40 text-white text-xs">Tsar</button>
      </div>
    </div>

    <!-- Canvas / overlays pour effets (pluie, confettis, etc.) -->
    <div id="effects-layer" class="fixed inset-0 pointer-events-none z-40 overflow-hidden"></div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
